name: Deploy to GitHub Pages

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write # Necessário para fazer push na branch gh-pages
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Get Meta Information
        id: meta
        run: |
          if [ "${GITHUB_REF_NAME}" = "master" ]; then
            echo "base_path=/unisinos-projeto-integrador/" >> $GITHUB_OUTPUT
            echo "target_folder=." >> $GITHUB_OUTPUT
            echo "clean_mode=true" >> $GITHUB_OUTPUT
          else
            echo "base_path=/unisinos-projeto-integrador/preview/${GITHUB_REF_NAME}/" >> $GITHUB_OUTPUT
            echo "target_folder=preview/${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "clean_mode=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build --base=${{ steps.meta.outputs.base_path }}

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          target-folder: ${{ steps.meta.outputs.target_folder }}
          branch: gh-pages
          clean: ${{ steps.meta.outputs.clean_mode }}
          clean-exclude: |
            preview/**
